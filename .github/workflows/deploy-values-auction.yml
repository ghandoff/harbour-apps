# deploy values-auction to cloudflare workers.
#
# matches the harbour-tail pattern (same account_id as paper-trail,
# deep-deck, etc.). zero-cost on cloudflare's free tier (1M requests +
# durable-objects usage included). real-time cross-device sync is handled
# by the worker's durable object (see apps/values-auction/worker/).
#
# one-time setup (per repo):
#   1. create a cloudflare api token with scope:
#      - account: workers scripts:edit, workers r2 storage:edit (optional)
#        at https://dash.cloudflare.com/profile/api-tokens → "Edit workers"
#   2. add it as a repo secret named CLOUDFLARE_API_TOKEN:
#      https://github.com/ghandoff/harbour-apps/settings/secrets/actions/new
#
# after that, every push that touches apps/values-auction/ auto-deploys.

name: deploy values-auction (cloudflare workers)

on:
  push:
    branches:
      - main
      - claude/values-auction-mvp-XdDOh
    paths:
      - 'apps/values-auction/**'
      - '.github/workflows/deploy-values-auction.yml'
  workflow_dispatch:

concurrency:
  group: deploy-values-auction
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: typecheck
        working-directory: apps/values-auction
        run: npx tsc --noEmit

      - name: unit tests
        working-directory: apps/values-auction
        run: npm test

      - name: build vite app for /harbour/values-auction
        working-directory: apps/values-auction
        env:
          VA_BASE: /harbour/values-auction/
        run: npx vite build

      - name: deploy worker
        working-directory: apps/values-auction
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 097c92553b268f8360b74f625f6d980a
        run: npx wrangler deploy
