<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the cuts catalogue.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    :root {
      --cadet: #273248;
      --cadet-dark: #1E2636;
      --champagne: #FFEBD2;
      --champagne-light: #FFF7E8;
      --redwood: #B15043;
      --sienna: #CB7858;
      --muted: #9A8577;
      --t1: #D4A84C;
      --t2: #CB7858;
      --t3: #B15043;
      --t4: #7E3A47;
      --t5: #4A2540;
      --sidebar-w: 280px;
      --header-h: 90px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      letter-spacing: 0.02em;
      background: var(--champagne);
      color: var(--cadet);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    :focus-visible {
      outline: 3px solid #3B82F6;
      outline-offset: 2px;
      border-radius: 2px;
    }

    button { cursor: pointer; font-family: inherit; }

    /* ── header ── */
    .site-header {
      background: var(--cadet);
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--champagne);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .header-title p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .wordmark {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      user-select: none;
    }
    .wordmark-wv { color: var(--champagne); }
    .wordmark-period { color: var(--redwood); }

    /* ── layout ── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--champagne);
      border-right: 1px solid rgba(39,50,72,0.12);
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      padding: 20px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── sidebar backdrop (mobile) ── */
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(39,50,72,0.45);
      z-index: 140;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sidebar-backdrop.open { opacity: 1; }

    /* ── mobile filter button ── */
    .mobile-filter-btn {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--cadet);
      color: var(--champagne);
      border: none;
      border-radius: 24px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      z-index: 130;
      box-shadow: 0 4px 16px rgba(39,50,72,0.3);
      gap: 6px;
      align-items: center;
      transition: background 0.12s;
    }
    .mobile-filter-btn:hover { background: var(--cadet-dark); }

    /* ── sidebar close (mobile only) ── */
    .sidebar-close {
      display: none;
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      font-size: 18px;
      color: var(--muted);
      padding: 4px 8px;
      line-height: 1;
      border-radius: 4px;
    }
    .sidebar-close:hover { color: var(--cadet); }

    /* ── search ── */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(39,50,72,0.2);
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      background: var(--champagne-light);
      color: var(--cadet);
      transition: border-color 0.12s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--cadet); outline: none; }
    .search-input:focus-visible { outline: 3px solid #3B82F6; outline-offset: 2px; }

    /* ── filter groups ── */
    .filter-group { display: flex; flex-direction: column; gap: 8px; }

    .filter-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--redwood);
      text-transform: lowercase;
    }

    .chip-group { display: flex; flex-wrap: wrap; gap: 5px; }

    .chip {
      padding: 4px 9px;
      border-radius: 4px;
      border: 1px solid rgba(154,133,119,0.45);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .chip:hover { border-color: var(--cadet); color: var(--cadet); }
    .chip.active { background: var(--cadet); color: var(--champagne); border-color: var(--cadet); }

    /* tier chips — colored borders and active states */
    .chip-t[data-value="1"] { border-color: var(--t1); color: var(--t1); }
    .chip-t[data-value="2"] { border-color: var(--t2); color: var(--t2); }
    .chip-t[data-value="3"] { border-color: var(--t3); color: var(--t3); }
    .chip-t[data-value="4"] { border-color: var(--t4); color: var(--t4); }
    .chip-t[data-value="5"] { border-color: var(--t5); color: var(--t5); }
    .chip-t[data-value="1"].active { background: var(--t1); border-color: var(--t1); color: var(--champagne); }
    .chip-t[data-value="2"].active { background: var(--t2); border-color: var(--t2); color: var(--champagne); }
    .chip-t[data-value="3"].active { background: var(--t3); border-color: var(--t3); color: var(--champagne); }
    .chip-t[data-value="4"].active { background: var(--t4); border-color: var(--t4); color: var(--champagne); }
    .chip-t[data-value="5"].active { background: var(--t5); border-color: var(--t5); color: var(--champagne); }

    /* ── tristate (assessable) ── */
    .tristate {
      display: flex;
      border: 1px solid rgba(154,133,119,0.45);
      border-radius: 4px;
      overflow: hidden;
    }
    .tristate-btn {
      flex: 1;
      padding: 5px 4px;
      border: none;
      background: transparent;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      transition: background 0.1s, color 0.1s;
    }
    .tristate-btn + .tristate-btn { border-left: 1px solid rgba(154,133,119,0.45); }
    .tristate-btn.active { background: var(--cadet); color: var(--champagne); }

    /* ── time range slider ── */
    .range-wrap { display: flex; flex-direction: column; gap: 8px; }
    .range-slider { position: relative; height: 24px; }
    .range-track {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 100%; height: 4px;
      background: rgba(154,133,119,0.25);
      border-radius: 2px;
    }
    .range-fill {
      position: absolute;
      height: 4px;
      background: var(--cadet);
      border-radius: 2px;
      top: 0;
    }
    .range-slider input[type="range"] {
      position: absolute;
      width: 100%; height: 4px;
      top: 50%; transform: translateY(-50%);
      background: transparent;
      -webkit-appearance: none;
      appearance: none;
      pointer-events: none;
      margin: 0;
    }
    .range-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--cadet);
      border: 2px solid var(--champagne);
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
      cursor: pointer;
      pointer-events: auto;
    }
    .range-slider input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--cadet);
      border: 2px solid var(--champagne);
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
      cursor: pointer;
      pointer-events: auto;
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── sidebar footer ── */
    .sidebar-foot {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(39,50,72,0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .result-count {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .reset-btn {
      padding: 7px 14px;
      border: 1px solid rgba(154,133,119,0.45);
      border-radius: 4px;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      transition: border-color 0.1s, color 0.1s;
      text-align: left;
    }
    .reset-btn:hover { border-color: var(--redwood); color: var(--redwood); }

    /* ── main content ── */
    .main-content { flex: 1; padding: 24px; min-width: 0; }

    /* ── cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    /* ── card ── */
    .card {
      display: flex;
      background: var(--champagne-light);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(39,50,72,0.07);
    }
    .card-bar { width: 4px; flex-shrink: 0; }
    .card-body {
      flex: 1;
      padding: 11px 13px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }
    .tier-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .tier-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      white-space: nowrap;
    }
    .time-chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      color: var(--champagne);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--cadet);
      line-height: 1.3;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--muted);
      row-gap: 2px;
    }
    .bdot { color: var(--muted); opacity: 0.4; padding: 0 1px; }
    .sdot { font-size: 8px; line-height: 1; }
    .sdots { display: inline-flex; gap: 2px; align-items: center; }
    .btag { color: var(--muted); }
    .assess-yes { color: var(--cadet); font-weight: 700; }
    .assess-no  { color: var(--muted); opacity: 0.5; }

    .card-desc {
      font-size: 12px;
      color: var(--cadet-dark);
      line-height: 1.5;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ── empty state ── */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      text-align: center;
      gap: 16px;
    }
    .empty-state p { color: var(--muted); font-size: 14px; }

    /* ── footer ── */
    .site-footer {
      padding: 20px 32px;
      border-top: 1px solid rgba(39,50,72,0.1);
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    /* ── responsive ── */
    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      :root { --header-h: 72px; }
      .site-header { padding: 0 20px; }
      .header-title h1 { font-size: 18px; }

      .mobile-filter-btn { display: flex; }
      .sidebar-close { display: block; }
      .sidebar-backdrop { display: block; }

      .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        width: min(100vw, 320px);
        z-index: 150;
        transform: translateX(-100%);
        transition: transform 0.22s ease;
        padding-top: 52px;
      }
      .sidebar.open { transform: translateX(0); }

      .main-content { padding: 16px; }
    }

    @media (max-width: 400px) {
      .tier-lbl { font-size: 9px; }
      .card-name { font-size: 14px; }
    }
  </style>
</head>

    </div>

    <div class="filter-group">
      <div class="filter-label" id="lbl-async">async</div>
      <div class="chip-group" role="group" aria-labelledby="lbl-async">
        <button class="chip" data-filter="async" data-value="sync-only" aria-pressed="false">sync-only</button>
        <button class="chip" data-filter="async" data-value="sync-preferred" aria-pressed="false">sync-pref</button>
        <button class="chip" data-filter="async" data-value="async-ok" aria-pressed="false">async-ok</button>
      </div>
    </div>

    <div class="sidebar-foot">
      <div class="result-count" id="result-count" aria-live="polite" aria-atomic="true">showing 100 of 100 moves</div>
      <button class="reset-btn" id="reset-btn">reset filters</button>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <div id="cards-grid" class="cards-grid" role="list" aria-label="active learning moves"></div>
    <div id="empty-state" class="empty-state" role="status" aria-live="polite">
      <p>no moves match. try widening a filter.</p>
      <button class="reset-btn" id="empty-reset-btn">reset filters</button>
    </div>
  </main>
</div>

<footer class="site-footer">
  <p>PPCS 2026 · session 3A · the cuts catalogue</p>
</footer>

<script>
(function () {
  'use strict';

  const data = JSON.parse(document.getElementById('cuts-data').textContent);
  const moves = data.moves;
  const tierMap = {};
  data.tiers.forEach(function (t) { tierMap[t.id] = t; });

  // ── state ──────────────────────────────────────────────────────────────────
  function fresh() {
    return { q: '', tier: [], timeMin: 1, timeMax: 10, classSize: [], prep: [], tech: [], position: [], stakes: [], assessable: 'any', async: [] };
  }
  var st = fresh();

  // ── elements ───────────────────────────────────────────────────────────────
  var searchEl    = document.getElementById('search-input');
  var timeMinEl   = document.getElementById('time-min');
  var timeMaxEl   = document.getElementById('time-max');
  var fillEl      = document.getElementById('range-fill');
  var lblTmin     = document.getElementById('lbl-tmin');
  var lblTmax     = document.getElementById('lbl-tmax');
  var countEl     = document.getElementById('result-count');
  var gridEl      = document.getElementById('cards-grid');
  var emptyEl     = document.getElementById('empty-state');
  var resetBtn    = document.getElementById('reset-btn');
  var emptyReset  = document.getElementById('empty-reset-btn');
  var sidebarEl   = document.getElementById('sidebar');
  var backdropEl  = document.getElementById('sidebar-backdrop');
  var mobileBtn   = document.getElementById('mobile-filter-btn');
  var closeBtn    = document.getElementById('sidebar-close');
  var badgeEl     = document.getElementById('filter-badge');
  var allChips    = document.querySelectorAll('.chip[data-filter]');
  var triBtns     = document.querySelectorAll('.tristate-btn');

  // ── URL sync ───────────────────────────────────────────────────────────────
  function readURL() {
    var p = new URLSearchParams(location.search);
    if (p.has('q'))      st.q = p.get('q');
    if (p.has('tier'))   st.tier = p.get('tier').split(',').map(Number).filter(function(n){return n>=1&&n<=5;});
    if (p.has('tmin'))   st.timeMin = Math.max(1, Math.min(10, parseInt(p.get('tmin')) || 1));
    if (p.has('tmax'))   st.timeMax = Math.max(1, Math.min(10, parseInt(p.get('tmax')) || 10));
    if (p.has('size'))   st.classSize = p.get('size').split(',').filter(Boolean);
    if (p.has('prep'))   st.prep = p.get('prep').split(',').filter(Boolean);
    if (p.has('tech'))   st.tech = p.get('tech').split(',').filter(Boolean);
    if (p.has('pos'))    st.position = p.get('pos').split(',').filter(Boolean);
    if (p.has('stakes')) st.stakes = p.get('stakes').split(',').filter(Boolean);
    if (p.has('assess')) { var a = p.get('assess'); if (['any','yes','no'].indexOf(a)>-1) st.assessable = a; }
    if (p.has('async'))  st.async = p.get('async').split(',').filter(Boolean);
  }

  function writeURL() {
    var p = new URLSearchParams();
    if (st.q)                          p.set('q',      st.q);
    if (st.tier.length)                p.set('tier',   st.tier.join(','));
    if (st.timeMin > 1)                p.set('tmin',   st.timeMin);
    if (st.timeMax < 10)               p.set('tmax',   st.timeMax);
    if (st.classSize.length)           p.set('size',   st.classSize.join(','));
    if (st.prep.length)                p.set('prep',   st.prep.join(','));
    if (st.tech.length)                p.set('tech',   st.tech.join(','));
    if (st.position.length)            p.set('pos',    st.position.join(','));
    if (st.stakes.length)              p.set('stakes', st.stakes.join(','));
    if (st.assessable !== 'any')       p.set('assess', st.assessable);
    if (st.async.length)               p.set('async',  st.async.join(','));
    var s = p.toString();
    history.replaceState(null, '', s ? ('?' + s) : location.pathname);
  }

  // ── filtering ──────────────────────────────────────────────────────────────
  function filtered() {
    return moves.filter(function (m) {
      if (st.q) {
        var q = st.q.toLowerCase();
        if (m.name.toLowerCase().indexOf(q) === -1 && m.description.toLowerCase().indexOf(q) === -1) return false;
      }
      if (st.tier.length && st.tier.indexOf(m.tier) === -1) return false;
      if (m.time_min < st.timeMin || m.time_min > st.timeMax) return false;
      if (st.classSize.length && !st.classSize.some(function(s){return m.class_size.indexOf(s)>-1;})) return false;
      if (st.prep.length && st.prep.indexOf(m.prep) === -1) return false;
      if (st.tech.length && st.tech.indexOf(m.tech) === -1) return false;
      if (st.position.length && !st.position.some(function(p){return m.position.indexOf(p)>-1;})) return false;
      if (st.stakes.length && st.stakes.indexOf(m.stakes) === -1) return false;
      if (st.assessable === 'yes' && !m.assessable) return false;
      if (st.assessable === 'no'  &&  m.assessable) return false;
      if (st.async.length && st.async.indexOf(m.async) === -1) return false;
      return true;
    }).sort(function (a, b) {
      return a.tier !== b.tier ? a.tier - b.tier : a.time_min - b.time_min;
    });
  }

  // ── card rendering ─────────────────────────────────────────────────────────
  function posLabel(pos) {
    var o = pos.indexOf('opening') > -1, m = pos.indexOf('middle') > -1, c = pos.indexOf('closing') > -1;
    if (o && m && c) return 'any';
    if (o && m)      return 'open/mid';
    if (m && c)      return 'mid/close';
    if (o && c)      return 'open/close';
    if (o)           return 'open';
    if (m)           return 'mid';
    return 'close';
  }

  var PREP = { zero: '—', light: '✱', heavy: '✱✱✱' };
  var TECH = { none: 'no tech', poll: 'poll', projector: 'projector', 'shared-board': 'board' };
  var ASYNC = { 'sync-only': 'sync-only', 'sync-preferred': 'sync-pref', 'async-ok': 'async-ok' };
  var STAKES_C = { low: '#22C55E', medium: '#F59E0B', high: '#EF4444' };
  var SIZES = ['small', 'medium', 'large'];

  function card(m) {
    var tier = tierMap[m.tier];
    var tc = tier.color_hex;
    var szLabel = SIZES.filter(function(s){return m.class_size.indexOf(s)>-1;}).join(', ');
    var dots = SIZES.map(function(s){
      var f = m.class_size.indexOf(s) > -1;
      return '<span class="sdot' + (f ? '" style="color:' + tc : ' btag') + '" aria-hidden="true" title="' + s + '">●</span>';
    }).join('');
    var prepTxt = PREP[m.prep];
    var stakesC = STAKES_C[m.stakes];
    var aLabel = 'class size: ' + szLabel + '; prep: ' + m.prep + '; tech: ' + m.tech + '; position: ' + m.position.join(', ') + '; stakes: ' + m.stakes + '; assessable: ' + (m.assessable ? 'yes' : 'no') + '; async: ' + m.async;

    return '<article class="card" role="listitem" aria-label="' + m.name + ', tier ' + m.tier + ' ' + tier.name + ', ' + m.time_min + ' min">'
      + '<div class="card-bar" style="background:' + tc + '" aria-hidden="true"></div>'
      + '<div class="card-body">'
        + '<div class="tier-row">'
          + '<span class="tier-lbl" style="color:' + tc + '">tier ' + m.tier + ' · ' + tier.name + '</span>'
          + '<span class="time-chip" style="background:' + tc + '">' + m.time_min + ' min</span>'
        + '</div>'
        + '<h2 class="card-name">' + m.name + '</h2>'
        + '<div class="badges" aria-label="' + aLabel + '">'
          + '<span class="sdots" aria-hidden="true">' + dots + '</span>'
          + '<span class="bdot" aria-hidden="true">·</span>'
          + '<span aria-hidden="true" style="color:' + tc + ';font-weight:600">' + prepTxt + '</span>'
          + '<span class="bdot" aria-hidden="true">·</span>'
          + '<span class="btag">' + TECH[m.tech] + '</span>'
          + '<span class="bdot" aria-hidden="true">·</span>'
          + '<span class="btag">' + posLabel(m.position) + '</span>'
          + '<span class="bdot" aria-hidden="true">·</span>'
          + '<span class="sdot" style="color:' + stakesC + '" aria-hidden="true">●</span>'
          + '<span class="btag">' + m.stakes + '</span>'
          + '<span class="bdot" aria-hidden="true">·</span>'
          + '<span class="' + (m.assessable ? 'assess-yes' : 'assess-no') + '" aria-hidden="true">' + (m.assessable ? '✓' : '—') + '</span>'
          + '<span class="bdot" aria-hidden="true">·</span>'
          + '<span class="btag">' + ASYNC[m.async] + '</span>'
        + '</div>'
        + '<p class="card-desc">' + m.description + '</p>'
      + '</div>'
    + '</article>';
  }

  // ── render ─────────────────────────────────────────────────────────────────
  function render() {
    var f = filtered();
    countEl.textContent = 'showing ' + f.length + ' of ' + moves.length + ' moves';
    updateBadge();
    if (f.length === 0) {
      gridEl.style.display = 'none';
      emptyEl.style.display = 'flex';
    } else {
      emptyEl.style.display = 'none';
      gridEl.style.display = 'grid';
      gridEl.innerHTML = f.map(card).join('');
    }
    writeURL();
  }

  // ── sync UI to state ───────────────────────────────────────────────────────
  function syncUI() {
    searchEl.value = st.q;
    timeMinEl.value = st.timeMin;
    timeMaxEl.value = st.timeMax;
    lblTmin.textContent = st.timeMin + ' min';
    lblTmax.textContent = st.timeMax + ' min';
    updateFill();

    allChips.forEach(function (chip) {
      var f = chip.dataset.filter;
      var v = chip.dataset.value;
      var active = f === 'tier' ? st.tier.indexOf(parseInt(v)) > -1 : st[f].indexOf(v) > -1;
      chip.classList.toggle('active', active);
      chip.setAttribute('aria-pressed', active ? 'true' : 'false');
    });

    triBtns.forEach(function (btn) {
      var active = btn.dataset.tri === st.assessable;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  function updateFill() {
    var mn = parseInt(timeMinEl.value), mx = parseInt(timeMaxEl.value);
    var p1 = ((mn - 1) / 9) * 100, p2 = ((mx - 1) / 9) * 100;
    fillEl.style.left = p1 + '%';
    fillEl.style.width = (p2 - p1) + '%';
  }

  function updateBadge() {
    var n = st.tier.length + st.classSize.length + st.prep.length + st.tech.length
          + st.position.length + st.stakes.length + st.async.length
          + (st.q ? 1 : 0)
          + (st.timeMin > 1 || st.timeMax < 10 ? 1 : 0)
          + (st.assessable !== 'any' ? 1 : 0);
    badgeEl.textContent = n > 0 ? '(' + n + ')' : '';
  }

  // ── reset ──────────────────────────────────────────────────────────────────
  function reset() {
    Object.assign(st, fresh());
    syncUI();
    render();
  }

  // ── events ─────────────────────────────────────────────────────────────────
  searchEl.addEventListener('input', function () { st.q = searchEl.value.trim(); render(); });

  timeMinEl.addEventListener('input', function () {
    var mn = parseInt(timeMinEl.value), mx = parseInt(timeMaxEl.value);
    if (mn > mx) { mx = mn; timeMaxEl.value = mx; }
    st.timeMin = mn; st.timeMax = mx;
    lblTmin.textContent = mn + ' min'; lblTmax.textContent = mx + ' min';
    updateFill(); render();
  });

  timeMaxEl.addEventListener('input', function () {
    var mn = parseInt(timeMinEl.value), mx = parseInt(timeMaxEl.value);
    if (mx < mn) { mn = mx; timeMinEl.value = mn; }
    st.timeMin = mn; st.timeMax = mx;
    lblTmin.textContent = mn + ' min'; lblTmax.textContent = mx + ' min';
    updateFill(); render();
  });

  allChips.forEach(function (chip) {
    chip.addEventListener('click', function () {
      var f = chip.dataset.filter;
      var v = f === 'tier' ? parseInt(chip.dataset.value) : chip.dataset.value;
      var arr = st[f];
      var idx = arr.indexOf(v);
      if (idx === -1) arr.push(v); else arr.splice(idx, 1);
      var active = idx === -1;
      chip.classList.toggle('active', active);
      chip.setAttribute('aria-pressed', active ? 'true' : 'false');
      render();
    });
  });

  triBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      st.assessable = btn.dataset.tri;
      triBtns.forEach(function (b) {
        var a = b.dataset.tri === st.assessable;
        b.classList.toggle('active', a);
        b.setAttribute('aria-pressed', a ? 'true' : 'false');
      });
      render();
    });
  });

  resetBtn.addEventListener('click', reset);
  emptyReset.addEventListener('click', reset);

  // ── mobile drawer ──────────────────────────────────────────────────────────
  function openSidebar() {
    sidebarEl.classList.add('open');
    backdropEl.classList.add('open');
    backdropEl.removeAttribute('aria-hidden');
    mobileBtn.setAttribute('aria-expanded', 'true');
    closeBtn.focus();
  }

  function closeSidebar() {
    sidebarEl.classList.remove('open');
    backdropEl.classList.remove('open');
    backdropEl.setAttribute('aria-hidden', 'true');
    mobileBtn.setAttribute('aria-expanded', 'false');
    mobileBtn.focus();
  }

  mobileBtn.addEventListener('click', openSidebar);
  closeBtn.addEventListener('click', closeSidebar);
  backdropEl.addEventListener('click', closeSidebar);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && sidebarEl.classList.contains('open')) closeSidebar();
  });

  // ── init ───────────────────────────────────────────────────────────────────
  readURL();
  syncUI();
  render();
}());
</script>
</body>
</html>
